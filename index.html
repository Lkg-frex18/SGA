<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SGA - Loading</title>

<style>
/* =========================
   COULEURS PRINCIPALES
========================= */
:root {
    --blanc: #ffffff;
    --marron: #6b3e26;
    --chocolat: #3b2a1a;
    --bleu: #1e4d7a;
}

/* =========================
   SPLASH SCREEN
========================= */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, var(--blanc), #f5f1ee);
    overflow: hidden;
    font-family: Arial;
}

.splash {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

/* LOGO */
.splash img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    box-shadow: 0 0 30px var(--marron),
                0 0 50px var(--bleu);
    animation: pulse 2s infinite;
}

/* TEXTE */
.splash h1 {
    margin-top: 15px;
    color: var(--chocolat);
    font-size: 22px;
    letter-spacing: 1px;
}

.splash p {
    color: var(--bleu);
    font-size: 14px;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 20px var(--marron), 0 0 30px var(--bleu);
    }
    50% {
        transform: scale(1.05);
        box-shadow: 0 0 40px var(--marron), 0 0 60px var(--bleu);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 20px var(--marron), 0 0 30px var(--bleu);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="splash">
    <img src="logo.png" alt="Logo SGA">
    <h1>Système de Gestion des Auditoires</h1>
    <p>Chargement en cours...</p>
</div>

<script>
/* =========================
   REDIRECTION APRÈS 3s
========================= */
setTimeout(() => {
    window.location.href = "index.php";
}, 3000);
</script>

</body>
</html>
